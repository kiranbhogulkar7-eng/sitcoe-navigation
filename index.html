from IPython.display import HTML
HTML('''
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    background: #f8f9fa;
}

header {
    background: #a8dadc;
    padding: 18px;
    font-size: 24px;
    font-weight: bold;
}

.button-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    padding: 10px;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.dept-btn { min-width: 220px; }

.cse { background:#b9e3e9; }
.mech { background:#f5e0be; }
.civil { background:#aed6f3; }
.electrical { background:#f0b4c8; }
.ece { background:#dbd8fa; }
.ar { background:#d0f5d3; }
.aids { background:#ffd6a5; }
.mechatronics { background:#c8b1eb; }
.library { background:#c8b1eb; }

#classrooms {
    display: none;
    margin-top: 20px;
}

#classBtns {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    padding: 10px 20px;
}

.class-btn {
    background: #4CAF50;
    color: white;
    padding: 10px;
    border-radius: 6px;
}

#map {
    height: 600px;
    margin: 20px auto;
    width: 95%;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>SITCOE Smart Campus Navigation</header>

<h3>Select Department</h3>

<div class="button-container">

<button class="dept-btn cse" onclick="showClassrooms('CSE')">CSE</button>
<button class="dept-btn mech" onclick="showClassrooms('Mechanical')">Mechanical</button>
<button class="dept-btn civil" onclick="showClassrooms('Civil')">Civil</button>
<button class="dept-btn electrical" onclick="showClassrooms('Electrical')">Electrical</button>
<button class="dept-btn ece" onclick="showClassrooms('ECE')">ECE</button>
<button class="dept-btn ar" onclick="showClassrooms('AR')">Automation & Robotics</button>
<button class="dept-btn aids" onclick="showClassrooms('AIDS')">AI & Data Science</button>
<button class="dept-btn mechatronics" onclick="showClassrooms('MECHATRONICS')">Mechatronics</button>
<button class="dept-btn library" onclick="showClassrooms('Library')">Library</button>

</div>

<div id="classrooms">
<h3>Select Classroom</h3>
<div id="classBtns"></div>
</div>

<div id="map"></div>

<script>

// MAIN GATE
var mainGate = [16.708013698320368, 74.47822739425105];

// MAP
var map = L.map('map').setView(mainGate, 18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 22
}).addTo(map);

L.marker(mainGate).addTo(map).bindPopup("Main Gate");

// ROUTE LAYER
var routeLayer = L.layerGroup().addTo(map);

// ================= ALL CLASSROOMS =================
var departments = {

"CSE": Object.fromEntries([...Array(20)].map((_,i)=>[
i+1, [16.70790+(i*0.00001), 74.47940+(i*0.00001)]
])),

"Mechanical": Object.fromEntries([...Array(20)].map((_,i)=>[
i+21, [16.70770+(i*0.00001), 74.47920+(i*0.00001)]
])),

"Civil": Object.fromEntries([...Array(20)].map((_,i)=>[
i+41, [16.70750+(i*0.00001), 74.47900+(i*0.00001)]
])),

"Electrical": Object.fromEntries([...Array(20)].map((_,i)=>[
i+61, [16.70730+(i*0.00001), 74.47880+(i*0.00001)]
])),

"ECE": Object.fromEntries([...Array(20)].map((_,i)=>[
i+81, [16.70710+(i*0.00001), 74.47860+(i*0.00001)]
])),

"AR": Object.fromEntries([...Array(20)].map((_,i)=>[
i+101, [16.70690+(i*0.00001), 74.47840+(i*0.00001)]
])),

"AIDS": Object.fromEntries([...Array(20)].map((_,i)=>[
i+121, [16.70670+(i*0.00001), 74.47820+(i*0.00001)]
])),

"MECHATRONICS": Object.fromEntries([...Array(20)].map((_,i)=>[
i+141, [16.70650+(i*0.00001), 74.47800+(i*0.00001)]
])),

"Library": Object.fromEntries([...Array(10)].map((_,i)=>[
i+161, [16.70630+(i*0.00001), 74.47780+(i*0.00001)]
]))

};

var selectedDept = "";

// SHOW CLASSROOMS
function showClassrooms(dept){
selectedDept = dept;

document.getElementById("classrooms").style.display = "block";
document.getElementById("classBtns").innerHTML = "";

for(let r in departments[dept]){
document.getElementById("classBtns").innerHTML +=
`<button class="class-btn" onclick="navigateTo(${r})">${dept} Room ${r}</button>`;
}
}

// NAVIGATION
function navigateTo(room){

routeLayer.clearLayers();

var dest = departments[selectedDept][room];

var url = `https://router.project-osrm.org/route/v1/walking/${mainGate[1]},${mainGate[0]};${dest[1]},${dest[0]}?overview=full&geometries=geojson`;

fetch(url)
.then(res => res.json())
.then(data => {
if(data.routes.length){
let coords = data.routes[0].geometry.coordinates;
let latlngs = coords.map(c => [c[1], c[0]]);
L.polyline(latlngs, {color:"blue", weight:5}).addTo(routeLayer);
}
});

L.marker(dest).addTo(routeLayer)
.bindPopup(selectedDept + " Room " + room)
.openPopup();
}

/* ================= LIVE LOCATION ================= */

var userMarker, userCircle;

map.on('locationfound', function(e){

if(!userMarker){
userMarker = L.marker(e.latlng).addTo(map).bindPopup("📍 You are here");
userCircle = L.circle(e.latlng, e.accuracy).addTo(map);
} else {
userMarker.setLatLng(e.latlng);
userCircle.setLatLng(e.latlng);
userCircle.setRadius(e.accuracy);
}

});

map.locate({
watch:true,
enableHighAccuracy:true,
setView:false
});

</script>
</body>
</html>
''')
