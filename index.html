// NAVIGATION
function navigateTo(room){
routeLayer.clearLayers();

var dest = departments[selectedDept][room];

var url = `https://router.project-osrm.org/route/v1/walking/${mainGate[1]},${mainGate[0]};${dest[1]},${dest[0]}?overview=full&geometries=geojson`;

fetch(url)
.then(res=>res.json())
.then(data=>{

let coords = data.routes[0].geometry.coordinates;
let latlngs = coords.map(c=>[c[1],c[0]]);
L.polyline(latlngs,{color:"blue",weight:6}).addTo(routeLayer);
}
})
.catch(()=>{
