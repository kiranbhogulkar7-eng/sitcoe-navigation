HTML('''
<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    text-align:center;
    background:#f5f7fa;
}

header {
    background:#a8dadc;

    width:45%;

.class-btn {
    background:#4CAF50;

    padding:8px 10px;

    cursor:pointer;
}

#map {
    height:600px;
    margin-top:15px;

    .box { width:90%; }

</head>

<body>

<header>SITCOE Smart Campus Navigation</header>

<h3>Select Department</h3>

<div id="deptContainer">
<button class="dept-btn cse" onclick="openDept('CSE')">Computer Science & Engineering</button>
<button class="dept-btn mech" onclick="openDept('MECH')">Mechanical Engineering</button>
<button class="dept-btn civil" onclick="openDept('Civil')">Civil Engineering</button>
<button class="dept-btn electrical" onclick="openDept('Electrical')">Electrical Engineering</button>
<button class="dept-btn ece" onclick="openDept('ECE')">Electronics & Computer Engineering</button>
<button class="dept-btn robotics" onclick="openDept('AR')">Automation & Robotics Engineering</button>
<button class="dept-btn cse" onclick="openDept('AIDS')">AI & Data Science</button>
<button class="dept-btn library" onclick="openDept('Library')">Library</button>
</div>

<div class="container">
<div class="box">
<h3>Classrooms</h3>
<div id="classBtns"></div>
</div>

<div class="box">
<h3>Labs</h3>
<div id="LabBtns"></div>
</div>
</div>

<div id="map"></div>

<script>

var mainGate = [16.708013698320368, 74.47822739425105];

// ===== CLASSROOMS =====
var departments = {

"CSE": {
38:[16.70790,74.47940],
43:[16.70791,74.47941],
44:[16.70792,74.47942],
45:[16.70793,74.47943],
60:[16.70794,74.47944]
},

"MECH": {
21:[16.70770,74.47920],
22:[16.70771,74.47921],
23:[16.70772,74.47922]
},

"Civil": {
41:[16.70750,74.47900],
42:[16.70751,74.47901]
},

"Electrical": {
61:[16.70730,74.47880],
62:[16.70731,74.47881]
},

"ECE": {
81:[16.70710,74.47860],
82:[16.70711,74.47861]
},

"AR": {
101:[16.70690,74.47840],
102:[16.70691,74.47841]
},

"AIDS": {
111:[16.70700,74.47850],
112:[16.70701,74.47851]
},

"Library": {
121:[16.70670,74.47820]
}

};

// ===== LABS =====
var Lab = {

"CSE": {
59:{name:"Project Lab",coord:[16.70795,74.47945]},
58:{name:"Programming Lab",coord:[16.70796,74.47946]},
56:{name:"Network Lab",coord:[16.70797,74.47947]},
55:{name:"Web Lab",coord:[16.70798,74.47948]},
54:{name:"OS Lab",coord:[16.70799,74.47949]},
53:{name:"HOD Office",coord:[16.70800,74.47950]},
52:{name:"Language Lab",coord:[16.70802,74.47952]},
51:{name:"DB Lab",coord:[16.70803,74.47953]}
},

"MECH": {
201:{name:"Thermal Lab",coord:[16.70780,74.47930]},
202:{name:"Workshop",coord:[16.70781,74.47931]}
},

"Civil": {
301:{name:"Survey Lab",coord:[16.70755,74.47905]}
},

"Electrical": {
401:{name:"Machine Lab",coord:[16.70735,74.47885]}
},

"ECE": {
501:{name:"VLSI Lab",coord:[16.70715,74.47865]}
},

"AR": {
601:{name:"Robotics Lab",coord:[16.70695,74.47845]}
},

"AIDS": {
701:{name:"AI Lab",coord:[16.70702,74.47852]}
}

};

var selectedDept = "";

// ===== MAP =====
var map = L.map('map').setView(mainGate, 18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:22
}).addTo(map);

L.marker(mainGate).addTo(map).bindPopup("Main Gate").openPopup();

var routeLayer = L.layerGroup().addTo(map);

// ===== OPEN DEPT =====
function openDept(dept){
selectedDept = dept;
showClassrooms(dept);
showLabs(dept);
}

// ===== CLASSROOMS =====
function showClassrooms(dept){
document.getElementById("classBtns").innerHTML = "";

for(let r in departments[dept]){
document.getElementById("classBtns").innerHTML +=
`<button class="class-btn" onclick="navigateTo(${r})">${dept} Room ${r}</button>`;
}
}

// ===== LABS =====
function showLabs(dept){
document.getElementById("LabBtns").innerHTML = "";

if(!Lab[dept]) return;

for(let l in Lab[dept]){
document.getElementById("LabBtns").innerHTML +=
`<button class="class-btn" onclick="navigateLab('${dept}',${l})">${Lab[dept][l].name}</button>`;
}
}

// ===== NAV CLASSROOM =====
function navigateTo(room){
routeLayer.clearLayers();
var dest = departments[selectedDept][room];
drawRoute(dest,"blue",selectedDept+" Room "+room);
}

// ===== NAV LAB =====
function navigateLab(dept,lab){
routeLayer.clearLayers();
var dest = Lab[dept][lab].coord;
drawRoute(dest,"green",Lab[dept][lab].name);
}

// ===== ROUTE =====
function drawRoute(dest,color,label){

var url = `https://router.project-osrm.org/route/v1/walking/${mainGate[1]},${mainGate[0]};${dest[1]},${dest[0]}?overview=full&geometries=geojson`;

fetch(url)
.then(r=>r.json())
.then(data=>{
if(data.routes.length){
let path = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
L.polyline(path,{color:color,weight:6}).addTo(routeLayer);
}
})
.catch(()=>{
L.polyline([mainGate,dest],{color:color,dashArray:"5,5"}).addTo(routeLayer);
});

L.marker(dest).addTo(routeLayer).bindPopup(label).openPopup();
}

</script>

</body>
</html>
''')
